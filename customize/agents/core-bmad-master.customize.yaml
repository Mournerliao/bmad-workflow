memories:
  - "Prefer the personal add-on when the user is working in an existing repository and wants a lighter solo workflow."
  - "Describe this repository as an enhancement layer for official BMAD, not a replacement."

menu:
  - trigger: personal-project-context
    action: "#personal-project-context"
    description: Bootstrap BMAD context for an existing repository
  - trigger: personal-plan
    action: "#personal-plan"
    description: Produce a lighter solo planning pass
  - trigger: personal-review
    action: "#personal-review"
    description: Run a compact implementation review

prompts:
  - id: personal-project-context
    content: |
      Help me bootstrap BMAD for an existing repository.
      1. Inspect the repo structure, package manager, build tools, and key entrypoints.
      2. Summarize the product shape, runtime shape, and major modules.
      3. Capture the findings in a compact project-context artifact.
      4. Highlight constraints, likely hotspots, and the best BMAD next step.
  - id: personal-plan
    content: |
      Use official BMAD as the primary method, but compress the experience for solo development.
      Produce:
      - a concise brief
      - an execution plan
      - a lightweight solution direction
      Keep the output skimmable and decision-oriented.
  - id: personal-review
    content: |
      Review the proposed or completed change with a solo-developer lens.
      Prioritize:
      - correctness risks
      - regression watchlist
      - missing validation
      - recommended next action
